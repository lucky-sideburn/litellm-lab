- name: Install shell transport script for LiteLLM chat completions
  hosts: all
  become: true

  vars:
    transport_script_path: /usr/local/bin/litellm-chat.sh
    litellm_transport_url: http://localhost:4000/chat/completions
    litellm_transport_model: llama3.2:1b

  tasks:
    - name: Install Test Chart Script
      ansible.builtin.copy:
        dest: "{{ transport_script_path }}"
        mode: "0755"
        owner: root
        group: root
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          URL="${1:-{{ litellm_transport_url }}}"
          MODEL="ollama/llama3.2:1b"

          curl --request POST \
            --url "$URL" \
            --header 'Accept: application/json' \
            --header 'Authorization: Bearer {{ litellm_master_key }}' \
            --header 'Content-Type: application/json' \
            --data "{\"model\": \"$MODEL\", \"messages\": [{\"role\": \"user\", \"content\": \"Print hello world with bash\"}]}"
    
    - name: Print transport usage
      ansible.builtin.debug:
        msg:
          - "Installed {{ transport_script_path }}"
          - "Run: {{ transport_script_path }}"
          - "Custom URL: {{ transport_script_path }} http://localhost:4000/chat/completions"
          - "Custom model: {{ transport_script_path }} http://localhost:4000/chat/completions llama3.2:1b"
